name: publish-pages

on:
  workflow_dispatch:
  push:
    branches: [main]
  workflow_run:
    workflows: [run-experiment]
    types: [completed]

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: |
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ vars.PYTHON_VERSION || '3.11' }}
      - name: Pages preflight check
        uses: actions/github-script@v8
        with:
          script: |
            try {
              await github.rest.repos.getPages({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              core.info('GitHub Pages is configured for this repository.');
            } catch (error) {
              if (error.status === 404) {
                core.setFailed([
                  'GitHub Pages is not configured for this repository.',
                  'Fix:',
                  '1) Repository Settings -> Pages',
                  '2) Build and deployment -> Source: GitHub Actions',
                  '3) Re-run this workflow',
                ].join('\n'));
                return;
              }
              throw error;
            }
      - name: Download run-full artifact from run-experiment
        if: github.event_name == 'workflow_run'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          mkdir -p outputs/runs
          python - <<'PY'
          import json
          import os
          import pathlib
          import tempfile
          import urllib.error
          import urllib.request
          import urllib.parse
          import zipfile

          owner = os.environ["OWNER"]
          repo = os.environ["REPO"]
          run_id = os.environ["RUN_ID"]
          token = os.environ["GITHUB_TOKEN"]

          req = urllib.request.Request(
              f"https://api.github.com/repos/{owner}/{repo}/actions/runs/{run_id}/artifacts",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(req) as resp:
              payload = json.loads(resp.read().decode("utf-8"))

          artifacts = payload.get("artifacts", [])
          match = next((a for a in artifacts if a.get("name") == "run-full" and not a.get("expired")), None)
          if not match:
              raise SystemExit("No non-expired run-full artifact found on triggering workflow run.")

          archive_url = match["archive_download_url"]

          def download_archive(url: str, destination: pathlib.Path) -> None:
              # The artifact endpoint returns a redirect to a signed blob URL.
              # If Authorization is forwarded to the redirected host, some
              # environments return 401. Follow redirects manually and only send
              # the token to api.github.com.
              current_url = url
              for _ in range(5):
                  parsed = urllib.parse.urlparse(current_url)
                  headers = {"Accept": "application/vnd.github+json"}
                  if parsed.netloc == "api.github.com":
                      headers["Authorization"] = f"Bearer {token}"
                      headers["X-GitHub-Api-Version"] = "2022-11-28"

                  req = urllib.request.Request(current_url, headers=headers)
                  try:
                      with urllib.request.urlopen(req) as resp:
                          destination.write_bytes(resp.read())
                      return
                  except urllib.error.HTTPError as err:
                      if err.code in {301, 302, 303, 307, 308}:
                          location = err.headers.get("Location")
                          if not location:
                              raise
                          current_url = urllib.parse.urljoin(current_url, location)
                          continue
                      raise
              raise SystemExit("Failed to download artifact archive after multiple redirects.")

          with tempfile.TemporaryDirectory() as tmp:
              zip_path = pathlib.Path(tmp) / "run-full.zip"
              download_archive(archive_url, zip_path)

              extract_dir = pathlib.Path(tmp) / "extract"
              extract_dir.mkdir(parents=True, exist_ok=True)
              with zipfile.ZipFile(zip_path) as zf:
                  zf.extractall(extract_dir)

              manifest_candidates = list(extract_dir.rglob("manifest.json"))
              if not manifest_candidates:
                  raise SystemExit("Artifact did not contain manifest.json; cannot place run into outputs/runs.")

              run_root = manifest_candidates[0].parent
              manifest = json.loads((run_root / "manifest.json").read_text(encoding="utf-8"))
              run_id_from_manifest = manifest.get("run_id") or run_root.name

              destination = pathlib.Path("outputs/runs") / run_id_from_manifest
              if destination.exists():
                  for p in sorted(destination.rglob("*"), reverse=True):
                      if p.is_file() or p.is_symlink():
                          p.unlink()
                      elif p.is_dir():
                          p.rmdir()
                  destination.rmdir()
              destination.mkdir(parents=True, exist_ok=True)

              for src in run_root.rglob("*"):
                  rel = src.relative_to(run_root)
                  dst = destination / rel
                  if src.is_dir():
                      dst.mkdir(parents=True, exist_ok=True)
                  else:
                      dst.parent.mkdir(parents=True, exist_ok=True)
                      dst.write_bytes(src.read_bytes())

              print(f"Downloaded run-full artifact into {destination}")
          PY
      - name: Build index
        run: |
          python scripts/build_pages_index.py
          mkdir -p site/runs
          cp -R outputs/runs/* site/runs/ 2>/dev/null || true
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
