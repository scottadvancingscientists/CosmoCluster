name: publish-pages

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.detect_runs.outputs.should_deploy }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PAGES_ARTIFACT_NAME: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ vars.PYTHON_VERSION || '3.11' }}
      - name: Pages preflight check
        uses: actions/github-script@v8
        with:
          script: |
            try {
              await github.rest.repos.getPages({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              core.info('GitHub Pages is configured for this repository.');
            } catch (error) {
              if (error.status === 404) {
                core.setFailed([
                  'GitHub Pages is not configured for this repository.',
                  'Fix:',
                  '1) Repository Settings -> Pages',
                  '2) Build and deployment -> Source: GitHub Actions',
                  '3) Re-run this workflow',
                ].join('\n'));
                return;
              }
              throw error;
            }
      - name: Build index
        run: |
          mkdir -p site/runs
          cp -R outputs/runs/* site/runs/ 2>/dev/null || true
          python scripts/build_pages_index.py
      - name: Detect whether site has runs
        id: detect_runs
        run: |
          COUNT=$(find site/runs -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l | tr -d ' ')
          echo "run_count=$COUNT" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" -gt 0 ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Found $COUNT run directories for Pages deployment."
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "No run directories found; skipping deploy to avoid overwriting an existing populated Pages site."
          fi
      - name: Setup Pages
        if: steps.detect_runs.outputs.should_deploy == 'true'
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        if: steps.detect_runs.outputs.should_deploy == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          name: ${{ env.PAGES_ARTIFACT_NAME }}
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.should_deploy == 'true'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
