name: publish-pages

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ vars.PYTHON_VERSION || '3.11' }}
      - name: Pages preflight check
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.repos.getPages({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              core.info('GitHub Pages is configured for this repository.');
            } catch (error) {
              if (error.status === 404) {
                core.setFailed([
                  'GitHub Pages is not configured for this repository.',
                  'Fix:',
                  '1) Repository Settings -> Pages',
                  '2) Build and deployment -> Source: GitHub Actions',
                  '3) Re-run this workflow',
                ].join('\n'));
                return;
              }
              throw error;
            }
      - name: Build index
        run: |
          python scripts/build_pages_index.py
          mkdir -p site/runs
          cp -R outputs/runs/* site/runs/ 2>/dev/null || true
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
