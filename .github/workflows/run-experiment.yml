name: run-experiment

on:
  workflow_dispatch:
    inputs:
      config_path:
        description: Experiment config path
        required: true
        default: experiments/configs/example_baseline.yaml
      backend:
        description: Backend to use (local/modal/gcp)
        required: true
        default: modal
      seed_override:
        description: Optional seed override (integer)
        required: false
        default: ""
      max_retries:
        description: Backend retry attempts after first failure
        required: false
        default: "2"
      retry_delay_seconds:
        description: Delay between backend retries (seconds)
        required: false
        default: "10"
      queue_timeout_seconds:
        description: Queue wait timeout before failing (seconds)
        required: false
        default: "900"
      run_mode:
        description: Run mode label
        required: false
        default: manual
      notes:
        description: Notes for this run
        required: false
        default: ""

permissions:
  contents: read
  actions: read

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ vars.PYTHON_VERSION || '3.11' }}
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate config
        run: python scripts/validate_config.py "${{ github.event.inputs.config_path }}"
      - name: Launch run
        id: launch
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          DEFAULT_BACKEND: ${{ vars.DEFAULT_BACKEND }}
        run: |
          BACKEND_INPUT="${{ github.event.inputs.backend }}"
          if [ -z "$BACKEND_INPUT" ]; then
            BACKEND_INPUT="${DEFAULT_BACKEND:-modal}"
          fi
          SEED_OVERRIDE_ARG=""
          if [ -n "${{ github.event.inputs.seed_override }}" ]; then
            SEED_OVERRIDE_ARG="--seed-override ${{ github.event.inputs.seed_override }}"
          fi
          python src/launch_run.py \
            --config "${{ github.event.inputs.config_path }}" \
            --backend "$BACKEND_INPUT" \
            --max-retries "${{ github.event.inputs.max_retries }}" \
            --retry-delay-seconds "${{ github.event.inputs.retry_delay_seconds }}" \
            --queue-timeout-seconds "${{ github.event.inputs.queue_timeout_seconds }}" \
            $SEED_OVERRIDE_ARG \
            --notes "${{ github.event.inputs.notes }}"
          RUN_DIR=$(ls -td outputs/runs/* | head -n1)
          echo "run_dir=$RUN_DIR" >> "$GITHUB_OUTPUT"
          echo "backend_used=$BACKEND_INPUT" >> "$GITHUB_OUTPUT"
      - name: Upload full run artifact
        uses: actions/upload-artifact@v6
        with:
          name: run-full
          path: ${{ steps.launch.outputs.run_dir }}
      - name: Upload logs artifact
        uses: actions/upload-artifact@v6
        with:
          name: run-logs
          path: ${{ steps.launch.outputs.run_dir }}/logs
      - name: Upload report-only artifact
        uses: actions/upload-artifact@v6
        with:
          name: run-report-only
          path: ${{ steps.launch.outputs.run_dir }}/report
      - name: Job summary
        run: |
          MODAL_MODE="n/a"
          if [ -f "${{ steps.launch.outputs.run_dir }}/collect_metadata.json" ]; then
            MODAL_MODE=$(python -c 'import json, pathlib; path = pathlib.Path("${{ steps.launch.outputs.run_dir }}/collect_metadata.json"); data = json.loads(path.read_text(encoding="utf-8")); print(data.get("mode", "unknown"))')
          fi
          echo "## Experiment run" >> $GITHUB_STEP_SUMMARY
          echo "- Run dir: ${{ steps.launch.outputs.run_dir }}" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: ${{ steps.launch.outputs.backend_used }}" >> $GITHUB_STEP_SUMMARY
          echo "- Seed override: ${{ github.event.inputs.seed_override || 'none' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Retries: ${{ github.event.inputs.max_retries }} (delay ${{ github.event.inputs.retry_delay_seconds }}s)" >> $GITHUB_STEP_SUMMARY
          echo "- Queue timeout: ${{ github.event.inputs.queue_timeout_seconds }}s" >> $GITHUB_STEP_SUMMARY
          echo "- Modal mode: ${MODAL_MODE}" >> $GITHUB_STEP_SUMMARY
          echo "- Artifacts: run-full, run-logs, run-report-only" >> $GITHUB_STEP_SUMMARY
