name: run-experiment

on:
  workflow_dispatch:
    inputs:
      config_path:
        description: Experiment config path
        required: true
        default: experiments/configs/example_baseline.yaml
      backend:
        description: Backend to use (local/modal/gcp)
        required: true
        default: local
      seed_override:
        description: Optional seed override (integer)
        required: false
        default: ""
      max_retries:
        description: Backend retry attempts after first failure
        required: false
        default: "2"
      retry_delay_seconds:
        description: Delay between backend retries (seconds)
        required: false
        default: "10"
      queue_timeout_seconds:
        description: Queue wait timeout before failing (seconds)
        required: false
        default: "900"
      run_mode:
        description: Run mode label
        required: false
        default: manual
      notes:
        description: Notes for this run
        required: false
        default: ""
      allow_demo_config:
        description: Allow demo/dummy/synthetic config (not recommended)
        required: false
        default: "false"

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ vars.PYTHON_VERSION || '3.11' }}
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate config
        run: python scripts/validate_config.py "${{ github.event.inputs.config_path }}"
      - name: Enforce meaningful experiment config
        env:
          CONFIG_PATH: ${{ github.event.inputs.config_path }}
          ALLOW_DEMO_CONFIG: ${{ github.event.inputs.allow_demo_config }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import sys
          import yaml

          config_path = Path(os.environ["CONFIG_PATH"])
          allow_demo = os.environ.get("ALLOW_DEMO_CONFIG", "").strip().lower() in {
              "1",
              "true",
              "yes",
              "on",
          }
          cfg = yaml.safe_load(config_path.read_text(encoding="utf-8")) or {}

          blocked_reasons: list[str] = []
          task_type = str(cfg.get("task_type", "")).strip().lower()
          dataset_name = str(cfg.get("dataset_name", "")).strip().lower()
          experiment_name = str(cfg.get("experiment_name", "")).strip().lower()
          tags = [str(tag).strip().lower() for tag in (cfg.get("tags") or []) if str(tag).strip()]

          if task_type == "dummy":
              blocked_reasons.append("task_type is 'dummy'")
          if any(token in dataset_name for token in ("synthetic", "dummy", "toy", "demo")):
              blocked_reasons.append(f"dataset_name looks non-production: '{cfg.get('dataset_name', '')}'")
          if any(token in experiment_name for token in ("synthetic", "dummy", "toy", "demo", "example")):
              blocked_reasons.append(f"experiment_name looks non-production: '{cfg.get('experiment_name', '')}'")
          if any(tag in {"dummy", "synthetic", "toy", "demo", "example"} for tag in tags):
              blocked_reasons.append(f"tags include demo-like markers: {tags}")

          if blocked_reasons and not allow_demo:
              print("Refusing to run a demo/non-meaningful experiment config by default.", file=sys.stderr)
              print("Reasons:", file=sys.stderr)
              for reason in blocked_reasons:
                  print(f"- {reason}", file=sys.stderr)
              print(
                  "To intentionally run a demo config, set workflow input "
                  "'allow_demo_config' to true.",
                  file=sys.stderr,
              )
              raise SystemExit(1)

          print(
              f"meaningful-config-check: pass (allow_demo_config={allow_demo}, "
              f"reasons={blocked_reasons})"
          )
          PY
      - name: Launch run
        id: launch
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          DEFAULT_BACKEND: ${{ vars.DEFAULT_BACKEND }}
        run: |
          BACKEND_INPUT="${{ github.event.inputs.backend }}"
          if [ -z "$BACKEND_INPUT" ]; then
            BACKEND_INPUT="${DEFAULT_BACKEND:-local}"
          fi
          SEED_OVERRIDE_ARG=""
          if [ -n "${{ github.event.inputs.seed_override }}" ]; then
            SEED_OVERRIDE_ARG="--seed-override ${{ github.event.inputs.seed_override }}"
          fi
          python src/launch_run.py \
            --config "${{ github.event.inputs.config_path }}" \
            --backend "$BACKEND_INPUT" \
            --max-retries "${{ github.event.inputs.max_retries }}" \
            --retry-delay-seconds "${{ github.event.inputs.retry_delay_seconds }}" \
            --queue-timeout-seconds "${{ github.event.inputs.queue_timeout_seconds }}" \
            $SEED_OVERRIDE_ARG \
            --notes "${{ github.event.inputs.notes }}"
          RUN_DIR=$(ls -td outputs/runs/* | head -n1)
          echo "run_dir=$RUN_DIR" >> "$GITHUB_OUTPUT"
          echo "backend_used=$BACKEND_INPUT" >> "$GITHUB_OUTPUT"
      - name: Upload full run artifact
        uses: actions/upload-artifact@v6
        with:
          name: run-full
          path: ${{ steps.launch.outputs.run_dir }}
      - name: Upload logs artifact
        uses: actions/upload-artifact@v6
        with:
          name: run-logs
          path: ${{ steps.launch.outputs.run_dir }}/logs
      - name: Upload report-only artifact
        uses: actions/upload-artifact@v6
        with:
          name: run-report-only
          path: ${{ steps.launch.outputs.run_dir }}/report
      - name: Job summary
        run: |
          MODAL_MODE="n/a"
          if [ -f "${{ steps.launch.outputs.run_dir }}/collect_metadata.json" ]; then
            MODAL_MODE=$(python -c 'import json, pathlib; path = pathlib.Path("${{ steps.launch.outputs.run_dir }}/collect_metadata.json"); data = json.loads(path.read_text(encoding="utf-8")); print(data.get("mode", "unknown"))')
          fi
          echo "## Experiment run" >> $GITHUB_STEP_SUMMARY
          echo "- Run dir: ${{ steps.launch.outputs.run_dir }}" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: ${{ steps.launch.outputs.backend_used }}" >> $GITHUB_STEP_SUMMARY
          echo "- Seed override: ${{ github.event.inputs.seed_override || 'none' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Retries: ${{ github.event.inputs.max_retries }} (delay ${{ github.event.inputs.retry_delay_seconds }}s)" >> $GITHUB_STEP_SUMMARY
          echo "- Queue timeout: ${{ github.event.inputs.queue_timeout_seconds }}s" >> $GITHUB_STEP_SUMMARY
          echo "- Modal mode: ${MODAL_MODE}" >> $GITHUB_STEP_SUMMARY
          echo "- Artifacts: run-full, run-logs, run-report-only" >> $GITHUB_STEP_SUMMARY


  publish-pages:
    name: publish-pages
    needs: run
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PAGES_ARTIFACT_NAME: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ vars.PYTHON_VERSION || '3.11' }}
      - name: Download run-full artifact from current run
        uses: actions/download-artifact@v6
        with:
          name: run-full
          path: outputs/_artifact_run_full
      - name: Normalize downloaded run artifact
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import shutil

          artifact_root = Path("outputs/_artifact_run_full")
          manifests = list(artifact_root.rglob("manifest.json"))
          if not manifests:
              raise SystemExit("run-full artifact missing manifest.json; cannot publish Pages index.")

          run_root = manifests[0].parent
          manifest = json.loads((run_root / "manifest.json").read_text(encoding="utf-8"))
          run_id = manifest.get("run_id") or run_root.name

          destination = Path("outputs/runs") / run_id
          if destination.exists():
              shutil.rmtree(destination)
          destination.parent.mkdir(parents=True, exist_ok=True)
          shutil.copytree(run_root, destination)
          print(f"Prepared run artifact at {destination}")
          PY
      - name: Build index
        run: |
          mkdir -p site/runs
          cp -R outputs/runs/* site/runs/ 2>/dev/null || true
          python scripts/build_pages_index.py
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          name: ${{ env.PAGES_ARTIFACT_NAME }}
          path: site
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
        with:
          artifact_name: ${{ env.PAGES_ARTIFACT_NAME }}
